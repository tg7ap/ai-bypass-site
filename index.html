<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Bypasser v8</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2302060a'/%3E%3Cpath d='M30 70 L45 30 L55 30 L70 70 M38 55 L62 55' fill='none' stroke='%2300f2ff' stroke-width='6'/%3E%3Cpath d='M80 20 L80 80' fill='none' stroke='%23ff0055' stroke-width='3' stroke-dasharray='10 5'/%3E%3Ccircle cx='80' cy='20' r='4' fill='%23ff0055'/%3E%3Ctext x='50%25' y='85%25' font-family='Courier New' font-size='12' fill='%2300f2ff' text-anchor='middle' font-weight='bold'%3EB-PASS%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>AI Bypasser // V8</header>

<main>
    <aside class="sidebar">
        <div class="search-wrap">
            <input type="text" id="searchEncoders" placeholder="SEARCH" oninput="filterEncoders()">
        </div>
        <nav id="encoderList">
            <button class="tab-btn active" data-mode="hex">Hexadecimal</button>
            <button class="tab-btn" data-mode="bin">Binary</button>
            <button class="tab-btn" data-mode="b64">Base64</button>
            <button class="tab-btn" data-mode="stretch">Text Stretch</button>
            <button class="tab-btn" data-mode="morse">Morse Code</button>
            <button class="tab-btn" data-mode="braille">Braille</button>
            <button class="tab-btn" data-mode="nato">Nato Phonetic</button>
            <button class="tab-btn" data-mode="leet">L33t Speak</button>
            <button class="tab-btn" data-mode="spongebob">SpongeBob Case</button>
            <button class="tab-btn" data-mode="rot13">Rot13</button>
            <button class="tab-btn" data-mode="atbash">Atbash Cipher</button>
            <button class="tab-btn" data-mode="caesar">Caesar Shift</button>
            <button class="tab-btn" data-mode="ascii">ASCII Decimal</button>
            <button class="tab-btn" data-mode="oct">Octal</button>
            <button class="tab-btn" data-mode="url">URL Encoding</button>
            <button class="tab-btn" data-mode="pig">Pig Latin</button>
            <button class="tab-btn" data-mode="rev">Reverse</button>
            <button class="tab-btn" data-mode="zalgo">Zalgo (Glitch)</button>
            <button class="tab-btn" data-mode="vapor">Vaporwave</button>
            <button class="tab-btn" data-mode="bubble">Bubble Text</button>
            <button class="tab-btn" data-mode="upside">Upside Down</button>
            <button class="tab-btn" data-mode="smallcaps">Small Caps</button>
        </nav>

        <div class="feedback-section">
            <button class="feedback-btn" onclick="openModal('suggestion')">>> SUGGEST FEATURE</button>
            <button class="feedback-btn" onclick="openModal('report')">>> REPORT ISSUE</button>
        </div>
    </aside>

    <section class="workspace">
        <div class="field-wrap">
            <label>INPUT</label>
            <textarea id="input" placeholder="Enter signal..." oninput="update()"></textarea>
        </div>

        <div class="field-wrap">
            <label>
                PROCESSED INPUT 
                <div class="controls">
                    <button class="action-btn" id="decodeToggle" onclick="toggleDecode()">Mode: Encode</button>
                    <button class="action-btn" onclick="copyText()">COPY</button>
                </div>
            </label>
            <div class="output-box" id="output">Nothing yet..</div>
        </div>
    </section>
</main>

<div id="feedbackModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">[CLOSE]</span>
        <div id="modalTitle" style="margin-bottom: 15px; font-weight: bold;">// SEND SIGNAL</div>
        <form action="https://formspree.io/f/xojnbqdg" method="POST">
            <input type="hidden" name="_subject" id="formSubject" value="Feedback">
            <input type="email" name="email" placeholder="Email (Optional)" style="width:100%; padding:8px; margin-bottom:10px; background:#000; color:#fff; border:1px solid var(--neon); outline: none;">
            <textarea name="message" rows="5" placeholder="Details..." required style="width:100%; padding:8px; margin-bottom:10px; background:#000; color:#fff; border:1px solid var(--neon); outline: none; resize: none;"></textarea>
            <button type="submit" style="width:100%; padding:10px; background:var(--neon); color:#000; border:none; font-weight:bold; cursor:pointer;">SEND TO UPLINK</button>
        </form>
    </div>
</div>

<a href="./LOCAL/AI Bypasser V7.1.1.zip" download="AI_Bypasser_V7.1.1.zip" class="local-dl">
    [↓] DOWNLOAD LOCAL (.ZIP)
</a>

<script src="script.js"></script>
</body>

</html>
